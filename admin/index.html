<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Content Manager | Stream2</title>
  <style>
    #brand-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: #0b3d5c;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    #brand-topbar img { height: 26px; width: auto; display: block; }
    #brand-topbar a { color: rgba(255,255,255,0.75); text-decoration: none; font-weight: 500; margin-left: auto; font-size: 0.82rem; }
    #brand-topbar a:hover { color: #fff; text-decoration: underline; }
  </style>
</head>
<body>
  <div id="brand-topbar">
    <img src="/assets/img/stream2-logo-white.png" alt="" />
    Stream2 Content Manager
    <a href="/" target="_blank" rel="noopener">Ver la web ↗</a>
  </div>
  <div id="nc-root"></div>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function (user) {
        if (!user) {
          window.netlifyIdentity.on("login", function () {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
  <script src="https://unpkg.com/decap-cms@3.15.1/dist/decap-cms.js"></script>
  <script src="/admin/preview.js"></script>
</body>
</html>
