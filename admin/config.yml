          - { label: "Texto botón principal", name: "cta1_label", widget: "string" }
          - { label: "Enlace botón principal", name: "cta1_href", widget: "string" }
          - { label: "Texto botón secundario", name: "cta2_label", widget: "string" }
          - { label: "Enlace botón secundario", name: "cta2_href", widget: "string" }
          - { label: "Vídeo o imagen de fondo", name: "background_video", widget: "file", media_folder: "assets/video", public_folder: "/assets/video" }

  - name: "for_hotels_en"
