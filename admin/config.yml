backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "home_en"
    label: "🏠 Home 🇬🇧"
    files:
      - name: "home_en"
        label: "Home — Hero"
        file: "content/home-en.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Headline — line 1", name: "headline_line1", widget: "string" }
          - { label: "Headline — line 2", name: "headline_line2", widget: "string" }
          - { label: "Subtitle", name: "lede", widget: "text" }
          - { label: "Primary button text", name: "cta1_label", widget: "string" }
          - { label: "Primary button link", name: "cta1_href", widget: "string" }
          - { label: "Secondary button text", name: "cta2_label", widget: "string" }
          - { label: "Secondary button link", name: "cta2_href", widget: "string" }
          - { label: "Background video or image", name: "background_video", widget: "file", media_folder: "assets/video", public_folder: "/assets/video" }

  - name: "home_es"
    label: "🏠 Inicio 🇪🇸"
