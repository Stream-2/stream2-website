backend:
  name: git-gateway
  branch: main

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:
  - name: "home_en"
    label: "Home (English)"
    files:
      - name: "home_en"
        label: "Home — Hero"
        file: "content/home-en.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Headline — line 1", name: "headline_line1", widget: "string" }
          - { label: "Headline — line 2", name: "headline_line2", widget: "string" }
